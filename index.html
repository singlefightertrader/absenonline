<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABSENSI • INTEGRASI WORKER</title>
<style>
  * { box-sizing: border-box; }
  body { background: #0b1120; font-family: system-ui, sans-serif; color: #e2e8f0; padding: 16px; margin: 0; }
  .container { max-width: 500px; margin: auto; }
  .card { background: #1e293b; border-radius: 32px; padding: 20px; margin-bottom: 20px; }
  h2 { margin-top: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { background: #0f172a; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
  input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 60px; border: none; font-size: 1rem; }
  input { background: #0f172a; color: white; text-align: center; }
  button { background: #10b981; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
  button:disabled { background: #475569; }
  video { width: 100%; border-radius: 24px; background: #000; transform: scaleX(-1); margin-top: 10px; }
  .instruction { background: #f59e0b; padding: 12px; border-radius: 60px; text-align: center; font-weight: bold; margin: 10px 0; }
  .status { margin-top: 12px; padding: 12px; border-radius: 60px; text-align: center; font-weight: bold; font-size: 0.85rem; }
  .success { background: #065f46; color: #a7f3d0; }
  .fail { background: #7f1a1a; color: #fecaca; }
  .info { background: #1e3a8a; color: #bfdbfe; }
  .warning { background: #b45309; color: #fed7aa; }
  .export-btn, .sync-btn { background: #3b82f6; margin-top: 8px; }
  .sync-btn { background: #8b5cf6; }
  .footer { font-size: 0.7rem; text-align: center; color: #64748b; margin-top: 16px; }
  canvas { display: none; }
  .row { display: flex; gap: 8px; }
  .row button { flex: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>📸 ABSENSI <span class="badge">WORKER SYNC</span></h2>
    <input type="text" id="nama" placeholder="Nama lengkap" autocomplete="off">
    <div id="instructionBox" class="instruction">🎥 Siapkan wajah di kamera</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <button id="btnAbsen">MULAI ABSEN</button>
    <div class="row">
      <button id="exportBtn" class="export-btn">📤 EKSPOR JSON</button>
      <button id="syncBtn" class="sync-btn">☁️ SYNC KE SERVER</button>
    </div>
    <div id="status" class="status info">🔒 Mode hybrid | Data disimpan lokal + bisa sync</div>
  </div>
  <div class="footer">⚡ GPS multi-sampling + random instruksi + 2 foto | Anti fake GPS</div>
</div>

<script>
  // ================= ✏️ KONFIGURASI (GANTI DENGAN URL WORKER ANDA) =================
  const API_URL = "https://absenonline.singlefightertrader.workers.dev";   // <-- GANTI INI
  
  // TARGET LOKASI (harus sama dengan di worker)
  const TARGET_LAT = -6.240501;     // ganti dengan titik absen Anda
  const TARGET_LNG = 107.007044;
  const RADIUS = 100;
  
  // SECRET SALT untuk signature (jangan diubah setelah deploy)
  const SECRET = "absen_internal_salt_2026";
  
  // ================= UTILITY HASH =================
  function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash).toString(16);
  }
  
  // ================= GLOBAL =================
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const statusDiv = document.getElementById("status");
  const btn = document.getElementById("btnAbsen");
  const namaInput = document.getElementById("nama");
  const instructionDiv = document.getElementById("instructionBox");
  
  let mediaStream = null;
  let attemptCount = 0;
  
  // ================= KAMERA =================
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(stream => {
      mediaStream = stream;
      video.srcObject = stream;
    })
    .catch(() => {
      statusDiv.innerHTML = "❌ Izin kamera ditolak";
      statusDiv.className = "status fail";
      btn.disabled = true;
    });
  
  // ================= ANTI TAB SWITCH =================
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      statusDiv.innerHTML = "⚠️ Jangan tinggalkan halaman!";
      statusDiv.className = "status warning";
      btn.disabled = true;
      setTimeout(() => { if (!document.hidden) btn.disabled = false; }, 1000);
    }
  });
  
  // ================= DEVICE FINGERPRINT + LOCK =================
  function getDeviceId() {
    const data = [
      navigator.userAgent,
      navigator.platform,
      screen.width,
      screen.height,
      Intl.DateTimeFormat().resolvedOptions().timeZone
    ].join("|");
    let hash = 0;
    for (let i = 0; i < data.length; i++) {
      hash = ((hash << 5) - hash) + data.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash).toString();
  }
  
  // ================= JARAK =================
  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const φ1 = lat1 * Math.PI/180;
    const φ2 = lat2 * Math.PI/180;
    const Δφ = (lat2-lat1) * Math.PI/180;
    const Δλ = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  
  // ================= GPS MULTI-SAMPLING + STABILITY =================
  async function getGpsWithCheck() {
    let positions = [];
    for (let i = 0; i < 3; i++) {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          timeout: 8000
        });
      });
      positions.push({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        acc: pos.coords.accuracy,
        timestamp: pos.timestamp
      });
      if (i < 2) await new Promise(r => setTimeout(r, 1500));
    }
    
    const p1 = positions[positions.length-2];
    const p2 = positions[positions.length-1];
    const jarak = getDistance(p1.lat, p1.lng, p2.lat, p2.lng);
    const selisihWaktu = (p2.timestamp - p1.timestamp) / 1000;
    const kecepatan = jarak / selisihWaktu;
    
    if (kecepatan > 30) throw new Error(`Pergerakan terlalu cepat (${Math.round(kecepatan)} m/s)`);
    if (jarak < 0.5 && selisihWaktu < 2) throw new Error("Lokasi tidak berubah (indikasi spoof)");
    if (p2.acc > 50) throw new Error(`Akurasi GPS rendah (${p2.acc}m)`);
    
    const distKeTarget = getDistance(p2.lat, p2.lng, TARGET_LAT, TARGET_LNG);
    if (distKeTarget > RADIUS) throw new Error(`Jauh dari target (${Math.round(distKeTarget)}m)`);
    
    return {
      lat: p2.lat,
      lng: p2.lng,
      accuracy: p2.acc,
      speed: kecepatan,
      distance: distKeTarget
    };
  }
  
  // ================= RANDOM INSTRUKSI =================
  function getRandomInstruction() {
    const actions = ["KEDIPKAN MATA 2x", "ANGKAT TANGAN KANAN", "SENTUH DAGU", "SENYUM LEBAR", "GELENG KEPALA"];
    return actions[Math.floor(Math.random() * actions.length)];
  }
  
  // ================= BURST CAPTURE =================
  async function burstCapture(count = 2, delayMs = 400) {
    let frames = [];
    for (let i = 0; i < count; i++) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      frames.push(canvas.toDataURL("image/jpeg", 0.4));
      if (i < count-1) await new Promise(r => setTimeout(r, delayMs));
    }
    return frames;
  }
  
  // ================= SIMPAN KE LOCALSTORAGE (OFFLINE) =================
  function saveToLocalStorage(record) {
    let logs = JSON.parse(localStorage.getItem("absen_offline") || "[]");
    logs.unshift(record);
    if (logs.length > 200) logs = logs.slice(0, 200);
    localStorage.setItem("absen_offline", JSON.stringify(logs));
  }
  
  // ================= AMBIL TOKEN DARI SERVER (ONLINE MODE) =================
  async function getToken() {
    const res = await fetch(`${API_URL}/token`);
    if (!res.ok) throw new Error("Gagal ambil token");
    const data = await res.json();
    return data.token;
  }
  
  // ================= PROSES ABSEN (PILIH ONLINE / OFFLINE) =================
  btn.onclick = async () => {
    const nama = namaInput.value.trim();
    if (!nama) {
      statusDiv.innerHTML = "❌ Isi nama dulu";
      statusDiv.className = "status fail";
      return;
    }
    if (attemptCount >= 3) {
      statusDiv.innerHTML = "❌ Batas percobaan (3x gagal). Refresh halaman.";
      statusDiv.className = "status fail";
      btn.disabled = true;
      return;
    }
    
    btn.disabled = true;
    statusDiv.innerHTML = "📍 Validasi lokasi (3x sampling)...";
    statusDiv.className = "status info";
    
    try {
      // 1. GPS
      const gpsData = await getGpsWithCheck();
      
      // 2. Instruksi acak
      const instruksi = getRandomInstruction();
      instructionDiv.innerHTML = `⚠️ LAKUKAN: ${instruksi} (3 detik)`;
      await new Promise(r => setTimeout(r, 3000));
      instructionDiv.innerHTML = "📸 Ambil 2 foto...";
      
      // 3. Burst capture
      const frames = await burstCapture(2, 400);
      
      // 4. Buat record
      const id = Date.now() + "-" + Math.random().toString(36).substring(2, 6);
      const deviceId = getDeviceId();
      const waktu = new Date().toISOString();
      const flagged = (gpsData.accuracy > 40 || gpsData.distance > 90 || gpsData.speed > 15);
      
      const record = {
        id, nama, waktu,
        lokasi: { lat: gpsData.lat, lng: gpsData.lng, accuracy: gpsData.accuracy },
        deviceId, instruksi, frames,
        distance: gpsData.distance, speed: gpsData.speed,
        flagged, offline: true, deviceLock: deviceId,
        signature: simpleHash(id + nama + waktu + deviceId + SECRET)
      };
      // Checksum
      const { checksum, ...rest } = record;
      record.checksum = simpleHash(JSON.stringify(rest));
      
      // 5. Simpan offline dulu
      saveToLocalStorage(record);
      
      // 6. Coba kirim ke server jika online
      let onlineSuccess = false;
      if (API_URL && API_URL !== "https://absen-lapangan.workers.dev") {
        try {
          const res = await fetch(`${API_URL}/absen_offline`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(record)
          });
          if (res.ok) onlineSuccess = true;
        } catch(e) { console.warn("Gagal sync otomatis", e); }
      }
      
      statusDiv.innerHTML = onlineSuccess ? "✅ ABSEN BERHASIL & TERSYNC" : "✅ ABSEN BERHASIL (disimpan offline)";
      statusDiv.className = onlineSuccess ? "status success" : "status warning";
      instructionDiv.innerHTML = "🎉 Terima kasih!";
      attemptCount = 0;
    } catch (err) {
      attemptCount++;
      statusDiv.innerHTML = `❌ ${err.message} (Sisa percobaan: ${3-attemptCount})`;
      statusDiv.className = "status fail";
      instructionDiv.innerHTML = "⚠️ Ulangi absen";
    } finally {
      setTimeout(() => { btn.disabled = false; }, 2000);
    }
  };
  
  // ================= EKSPOR JSON =================
  document.getElementById("exportBtn").onclick = () => {
    const raw = localStorage.getItem("absen_offline");
    if (!raw || raw === "[]") {
      statusDiv.innerHTML = "❌ Belum ada data absen";
      statusDiv.className = "status fail";
      return;
    }
    let logs = JSON.parse(raw);
    // Verifikasi checksum (opsional, tetap diekspor)
    let corrupted = false;
    for (let rec of logs) {
      if (rec.checksum) {
        const { checksum, ...rest } = rec;
        if (simpleHash(JSON.stringify(rest)) !== checksum) corrupted = true;
      } else corrupted = true;
    }
    const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `absen_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    statusDiv.innerHTML = corrupted ? "⚠️ Data diekspor (ada yang rusak/diedit)" : "✅ Ekspor sukses";
    statusDiv.className = corrupted ? "status warning" : "status success";
    setTimeout(() => {
      statusDiv.innerHTML = "🔒 Mode hybrid siap";
      statusDiv.className = "status info";
    }, 2000);
  };
  
  // ================= SYNC MANUAL KE SERVER =================
  document.getElementById("syncBtn").onclick = async () => {
    if (!API_URL || API_URL === "https://absen-lapangan.workers.dev") {
      statusDiv.innerHTML = "⚠️ Server belum dikonfigurasi. Ganti API_URL di kode.";
      statusDiv.className = "status warning";
      return;
    }
    const raw = localStorage.getItem("absen_offline");
    if (!raw || raw === "[]") {
      statusDiv.innerHTML = "❌ Tidak ada data offline untuk disync";
      statusDiv.className = "status fail";
      return;
    }
    let logs = JSON.parse(raw);
    let successCount = 0, failCount = 0;
    for (let rec of logs) {
      if (rec.synced) continue;
      try {
        const res = await fetch(`${API_URL}/absen_offline`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(rec)
        });
        if (res.ok) {
          rec.synced = true;
          successCount++;
        } else failCount++;
      } catch(e) { failCount++; }
    }
    localStorage.setItem("absen_offline", JSON.stringify(logs));
    statusDiv.innerHTML = `✅ Sync: ${successCount} sukses, ${failCount} gagal.`;
    statusDiv.className = "status success";
    setTimeout(() => {
      statusDiv.innerHTML = "🔒 Mode hybrid siap";
      statusDiv.className = "status info";
    }, 3000);
  };
</script>
</body>
</html>
