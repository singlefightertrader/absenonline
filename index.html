<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>BLACK OPS • ABSENSI</title>
<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  background: linear-gradient(145deg, #020617, #0f172a);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #e2e8f0;
  padding: 16px;
  min-height: 100vh;
}

.card {
  background: rgba(30, 41, 59, 0.9);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

h2 {
  text-align: center;
  margin: 0 0 16px 0;
  font-size: 22px;
}

button {
  background: #10b981;
  border: none;
  padding: 14px 20px;
  border-radius: 60px;
  color: white;
  font-size: 16px;
  font-weight: 600;
  width: 100%;
  margin: 8px 0;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.97);
}

button:disabled {
  background: #475569;
  opacity: 0.6;
  transform: none;
}

input {
  background: #0f172a;
  border: 1px solid #334155;
  padding: 14px 16px;
  border-radius: 60px;
  color: white;
  font-size: 16px;
  width: 100%;
  margin: 8px 0;
  text-align: center;
}

.status {
  padding: 12px;
  border-radius: 60px;
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
  font-weight: 500;
}

.success { background: #065f46; }
.fail { background: #991b1b; }
.warning { background: #b45309; }
.info { background: #1e3a8a; }

.video-container {
  background: #000;
  border-radius: 20px;
  overflow: hidden;
  margin: 12px 0;
  position: relative;
}

video {
  width: 100%;
  display: block;
  aspect-ratio: 4/3;
  object-fit: cover;
  background: #000;
  transform: scaleX(-1);
}

.challenge-box {
  background: #0f172a;
  padding: 16px;
  border-radius: 20px;
  margin: 12px 0;
  text-align: center;
  border: 1px solid #334155;
}

.challenge-text {
  font-size: 20px;
  font-weight: bold;
  color: #f59e0b;
  margin-bottom: 12px;
}

small {
  display: block;
  text-align: center;
  margin-top: 12px;
  color: #94a3b8;
  font-size: 11px;
}
</style>
</head>
<body>

<div class="card">
  <h2>📸 BLACK OPS • ABSENSI</h2>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <input type="text" id="nama" placeholder="Nama lengkap" autocomplete="off">

  <div class="challenge-box">
    <div class="challenge-text" id="challengeText">ANGKAT TANGAN</div>
    <input type="text" id="challengeInput" placeholder="Ketik perintah di atas" autocomplete="off">
  </div>

  <div class="status info" id="status">📱 Siap absen</div>

  <button id="startCameraBtn">🎥 AKTIFKAN KAMERA</button>
  <button id="absenBtn" disabled>✅ ABSEN SEKARANG</button>

  <small id="deviceInfo"></small>
</div>

<script>
// KONFIGURASI
const WORKER_URL = "https://absenonline.singlefightertrader.workers.dev";

// VARIABEL
let cameraActive = false;
let cameraStream = null;
let currentChallenge = "ANGKAT TANGAN";

// ==================== DEVICE ID ====================
function getDeviceId() {
  let str = navigator.userAgent + screen.width + screen.height + screen.colorDepth;
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash = hash | 0;
  }
  if (hash < 0) hash = -hash;
  return hash.toString(16).slice(0, 12);
}

const DEVICE_ID = getDeviceId();
document.getElementById("deviceInfo").innerHTML = "📱 Device ID: " + DEVICE_ID;

// ==================== KAMERA ====================
async function startCamera() {
  try {
    if (cameraStream) {
      cameraStream.getTracks().forEach(track => track.stop());
    }
    
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    
    cameraStream = stream;
    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();
    
    cameraActive = true;
    document.getElementById("startCameraBtn").style.display = "none";
    document.getElementById("absenBtn").disabled = false;
    document.getElementById("status").innerHTML = "✅ Kamera aktif! Siap absen.";
    document.getElementById("status").className = "status success";
    
  } catch (err) {
    document.getElementById("status").innerHTML = "❌ Gagal akses kamera: " + err.message;
    document.getElementById("status").className = "status fail";
    cameraActive = false;
  }
}

// ==================== CAPTURE FOTO ====================
async function captureFoto() {
  const video = document.getElementById("video");
  if (!video || video.videoWidth === 0) return null;
  
  const canvas = document.createElement("canvas");
  // Ukuran kecil agar cepat dikirim
  canvas.width = 200;
  canvas.height = 200 * (video.videoHeight / video.videoWidth);
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  
  return canvas.toDataURL("image/jpeg", 0.5);
}

// ==================== KIRIM KE SERVER ====================
async function kirimKeServer(data) {
  try {
    const response = await fetch(WORKER_URL + "/absen_offline", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    const result = await response.json();
    return result.success === true;
  } catch (error) {
    console.error("Kirim error:", error);
    return false;
  }
}

// ==================== ABSEN ====================
document.getElementById("absenBtn").onclick = async function() {
  // Cek kamera
  if (!cameraActive) {
    alert("❌ Aktifkan kamera terlebih dahulu!");
    return;
  }
  
  // Cek nama
  const nama = document.getElementById("nama").value.trim();
  if (nama === "") {
    alert("❌ Isi nama lengkap!");
    return;
  }
  
  // Verifikasi challenge
  const userInput = document.getElementById("challengeInput").value.trim().toUpperCase();
  if (userInput !== currentChallenge) {
    alert("❌ SALAH! Harus ketik: " + currentChallenge);
    return;
  }
  
  // Proses absen
  document.getElementById("status").innerHTML = "📸 Mengambil foto...";
  document.getElementById("status").className = "status warning";
  
  const foto = await captureFoto();
  
  document.getElementById("status").innerHTML = "☁️ Mengirim ke server...";
  
  const absenData = {
    nama: nama,
    deviceId: DEVICE_ID,
    foto: foto,
    challenge: currentChallenge,
    waktu: new Date().toISOString()
  };
  
  const berhasil = await kirimKeServer(absenData);
  
  if (berhasil) {
    document.getElementById("status").innerHTML = "✅ ABSEN BERHASIL! Data tersimpan di server.";
    document.getElementById("status").className = "status success";
    alert("✅ BERHASIL!\nNama: " + nama + "\nPerintah: " + currentChallenge);
  } else {
    document.getElementById("status").innerHTML = "❌ GAGAL! Periksa koneksi internet.";
    document.getElementById("status").className = "status fail";
    alert("❌ GAGAL! Tidak dapat terhubung ke server.");
  }
  
  // Reset form
  document.getElementById("challengeInput").value = "";
  document.getElementById("nama").value = "";
};

// ==================== START ====================
document.getElementById("startCameraBtn").onclick = startCamera;

// Test koneksi ke worker
fetch(WORKER_URL + "/time")
  .then(res => res.json())
  .then(data => {
    console.log("Worker connected:", data);
    document.getElementById("status").innerHTML = "✅ Server terhubung! Aktifkan kamera.";
  })
  .catch(err => {
    console.log("Worker error:", err);
    document.getElementById("status").innerHTML = "⚠️ Server tidak terhubung, periksa koneksi.";
  });
</script>
</body>
</html>
